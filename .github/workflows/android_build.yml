name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 20
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      # Resource Linking Error ကို ကျော်ဖြတ်ဖို့အတွက် clean လုပ်ပြီးမှ build ပါ
      - name: Build with Gradle
        run: ./gradlew clean :app:assembleDebug --no-build-cache --refresh-dependencies --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
