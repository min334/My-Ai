name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ဒီနေရာကို ပြင်ထားပါတယ်
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Install Android Platform
        run: npx cap add android || true

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '24'

      - name: Build with Gradle
        env:
          VITE_API_URL: https://github-uploader-jade.vercel.app/
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GAUP-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
