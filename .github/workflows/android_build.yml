name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Library အသစ်များကို အပြည့်အဝ ဆွဲချပြီးမှ Build လုပ်ရန် --refresh-dependencies ကို သုံးထားပါတယ်
      - name: Build with Gradle
        run: ./gradlew clean :app:assembleDebug --refresh-dependencies --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
